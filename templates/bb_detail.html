{% extends "layout/basic.html" %}

{% block title %}{{ bb.title }}{% endblock %}

{% block content %}

<div class="card">

    <h2>{{ bb.title }}</h2>

    <p>{{ bb.content }}</p>

    <p> Цена: <b>{{ bb.price }} ₽</b></p>

    <p> Рубрика: {{ bb.rubric.name }}</p>

    <p> {{ bb.published|date:"d.m.Y H:i" }}</p>

    <p>
        <a class="btn delete" href="{% url 'bb_delete' bb.id %}">
            🗑 Удалить
        </a>
    </p>

</div>

{% endblock %}
